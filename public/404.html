<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#357dff" />
    <meta name="description" content="ShopZen — A modern, responsive e-commerce experience." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>ShopZen — Modern E-commerce</title>
    <script>
      // SPA fallback: GitHub Pages serves this 404.html for any unknown route.
      // Redirect to the root so React Router can pick up the original path.
      (function () {
        var path = window.location.pathname;
        // Strip the repo base (/React-App/) so React Router sees the in-app path
        var base = '/React-App';
        if (path.indexOf(base) === 0) path = path.slice(base.length);
        if (!path || path === '/') path = '/';
        window.location.replace(base + '/' + (path.charAt(0) === '/' ? path.slice(1) : path));
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
